name: Deploy to Easypanel

on:
  push:
    branches:
      - main
      - feature/notifications

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Easypanel deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.EASYPANEL_WEBHOOK_URL }}"
